server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://202311002_db_user:BjIvRVCytDZaAwM7@virtualhuman.02ocf2s.mongodb.net/virtual_human_behavior

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000

# Groq API Configuration
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=api

# --- Observability & Actuator ---
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=virtualhuman-brain

# --- Resilience4j Configuration ---
# Circuit Breaker for Groq
resilience4j.circuitbreaker.instances.groq.sliding-window-size=10
resilience4j.circuitbreaker.instances.groq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groq.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.groq.permitted-number-of-calls-in-half-open-state=3

# Retry for Groq
resilience4j.retry.instances.groq.max-attempts=3
resilience4j.retry.instances.groq.wait-duration=2s
